<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Prediction App</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        .topbar {
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
        }

        .box {
            width: 380px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 95%;
            padding: 10px;
            margin: 6px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        .result {
            margin-top: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="topbar">
    Diabetes Prediction System
</div>

<div class="box">

    <h2>Enter Patient Details</h2>

    <form action="/predict" method="post">

        <input type="number" step="any" name="pregnancies" placeholder="Pregnancies" required>
        <input type="number" step="any" name="glucose" placeholder="Glucose" required>
        <input type="number" step="any" name="bloodpressure" placeholder="Blood Pressure" required>
        <input type="number" step="any" name="skinthickness" placeholder="Skin Thickness" required>
        <input type="number" step="any" name="insulin" placeholder="Insulin" required>
        <input type="number" step="any" name="bmi" placeholder="BMI" required>
        <input type="number" step="any" name="dpf" placeholder="Diabetes Pedigree Function" required>
        <input type="number" step="any" name="age" placeholder="Age" required>

        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <div class="result">
            {{ prediction }}
        </div>
    {% endif %}

</div>

</body>
</html>
